<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>三线表转换 · 表格生成器</title>
<link rel="stylesheet" href="_shared.css">
<script type="importmap">
{ "imports": { "docx": "https://cdn.jsdelivr.net/npm/docx@9.1.1/+esm" } }
</script>
<style>
:root {
  --card-bg: var(--panel);
  --card-border: var(--border);
  --input-bg: #131315;
  --accent: #0071e3;
  --accent-hover: #0077ed;
}
.page { max-width: 720px; }

.steps-bar {
  display: flex; align-items: center; margin: 0 auto 32px; max-width: 380px;
}
.step-item { display: flex; align-items: center; }
.step-content { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.step-circle {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: var(--panel-2); color: var(--text-mute);
  transition: all 0.4s;
}
.step-circle.active { background: var(--blue); color: #fff; }
.step-label { font-size: 12.5px; color: var(--text-mute); transition: all 0.3s; }
.step-label.active { font-weight: 600; color: var(--text); }
.step-line {
  flex: 1; height: 2px; margin: 0 10px;
  background: var(--border); border-radius: 1px; transition: all 0.4s;
}
.step-line.active { background: var(--blue); }

.dropzone {
  border: 2px dashed var(--border-strong);
  border-radius: 16px; padding: 44px 20px; text-align: center; cursor: pointer;
  transition: all 0.3s; background: #131315;
}
.dropzone:hover, .dropzone.dragging {
  border-color: var(--blue-accent);
  background: rgba(41,151,255,0.06);
}
.drop-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.7; }
.drop-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.drop-hint { font-size: 12.5px; color: var(--text-mute); line-height: 1.6; }

.file-attached {
  border: 2px solid var(--blue);
  border-radius: 16px; padding: 16px 20px;
  background: rgba(41,151,255,0.06);
  display: flex; align-items: center; gap: 14px;
}
.file-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: rgba(41,151,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { font-size: 12px; color: var(--text-mute); margin-top: 2px; }
.file-remove {
  background: none; border: none; cursor: pointer;
  color: var(--text-mute); font-size: 20px; padding: 4px 8px;
  border-radius: 6px; transition: color 0.2s; line-height: 1;
}
.file-remove:hover { color: var(--red); }

.error-msg {
  padding: 12px 14px; background: rgba(255,69,58,0.08);
  border: 1px solid rgba(255,69,58,0.2); border-radius: 14px;
  color: var(--red); font-size: 13px; margin-bottom: 18px; line-height: 1.5;
}
.progress-msg {
  padding: 12px 14px; background: rgba(41,151,255,0.08);
  border-radius: 14px; color: var(--blue-accent);
  font-size: 13px; font-weight: 500; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2.5px solid rgba(41,151,255,0.2);
  border-top-color: var(--blue-accent);
  border-radius: 50%; animation: spin 0.75s linear infinite;
}
.btn-spinner {
  width: 16px; height: 16px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%; animation: spin 0.75s linear infinite;
  display: inline-block; vertical-align: middle; margin-right: 8px;
}

.preview-card {
  border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
  background: var(--panel); margin-top: 22px;
}
.preview-header {
  padding: 12px 18px; background: #131315; border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 7px;
}
.preview-scroll { overflow-x: auto; }
.preview-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.preview-table thead tr {
  border-top: 2.5px solid var(--text); border-bottom: 1.5px solid var(--text-mute);
}
.preview-table th {
  padding: 10px 14px; text-align: center; font-weight: 700;
  color: var(--text); white-space: nowrap;
}
.preview-table td {
  padding: 8px 14px; text-align: center; color: var(--text-mute);
  white-space: pre-line; line-height: 1.5;
}
.preview-table .last-row { border-bottom: 2.5px solid var(--text); }
.preview-table .bold-cell { font-weight: 700; }

.btn-row { display: flex; gap: 12px; }
.tip-box {
  margin-top: 8px; padding: 10px 14px;
  background: rgba(255,204,0,0.06); border: 1px solid rgba(255,204,0,0.2);
  border-radius: 10px; font-size: 12px; color: #ffcc00; line-height: 1.6;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.45s ease forwards; }

@media (max-width: 520px) {
  .page { padding: 40px 12px 80px; }
}
</style>
</head>
<body>
<div id="nav"></div>
<script src="_nav.js" data-active="workspace"></script>

<main class="page">
  <header class="page-hero fade-in">
    <h1>三线表转换 <span class="mute">· 表格生成器</span></h1>
    <p class="subtitle">上传数据或图片，AI 自动提取表格，生成规范三线表 DOCX 文档</p>
  </header>

  <div class="steps-bar fade-in" id="steps-bar"></div>

  <div class="bento-card fade-in" style="padding:28px;" id="main-card">
    <!-- API Key + Model -->
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-bottom:20px;">
      <div>
        <label class="field-label">DeepSeek API Key</label>
        <div style="position:relative;">
          <input class="apple-input" id="api-key" type="password" placeholder="sk-..." style="padding-right:44px;">
          <button id="key-toggle" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-mute);">👁️</button>
        </div>
      </div>
      <div>
        <label class="field-label">模型</label>
        <select class="apple-input" id="model-select">
          <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
          <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
          <option value="deepseek-chat">DeepSeek Chat (旧版)</option>
        </select>
      </div>
    </div>

    <!-- File Upload -->
    <div style="margin-bottom:20px;">
      <label class="field-label">上传文件</label>
      <div id="file-zone"></div>
      <div class="tip-box" id="img-tip" style="display:none;">图片模式需要 DeepSeek 视觉模型支持。如遇错误，建议先用 OCR 工具将图片转为文本/CSV 后上传。</div>
    </div>

    <!-- Custom Prompt -->
    <div style="margin-bottom:20px;">
      <label class="field-label">补充说明 <span style="font-weight:400;color:var(--text-mute);">（可选）</span></label>
      <textarea class="apple-input" id="custom-prompt" placeholder="例如：只提取前 5 行、忽略合计行、表头用英文…" rows="2" style="resize:vertical;font-family:inherit;"></textarea>
    </div>

    <div id="error-box"></div>
    <div id="progress-box"></div>

    <div id="btn-area"></div>
  </div>

  <div id="preview-area"></div>

  <div style="text-align:center;margin-top:36px;font-size:11.5px;color:var(--text-mute);line-height:1.7;">
    基于 DeepSeek API · 推荐模型: deepseek-v4-pro<br>
    三线表规范：顶线 1.5 磅 · 栏目线 0.75 磅 · 底线 1.5 磅 · 无竖线
  </div>
</main>

<script type="module">
import { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, AlignmentType, BorderStyle, WidthType } from "docx";

// ─── State ───
let file = null;
let tableData = null;
let loading = false;

// ─── DOM refs ───
const $ = (id) => document.getElementById(id);
const apiKeyEl = $("api-key");
const modelEl = $("model-select");
const fileZone = $("file-zone");
const imgTip = $("img-tip");
const customPromptEl = $("custom-prompt");
const errorBox = $("error-box");
const progressBox = $("progress-box");
const btnArea = $("btn-area");
const previewArea = $("preview-area");
const stepsBar = $("steps-bar");
const keyToggle = $("key-toggle");

// ─── Steps bar ───
const stepNames = ["配置 API", "上传文件", "预览下载"];
function renderSteps() {
  const step = tableData ? 3 : file ? 2 : 1;
  let html = "";
  stepNames.forEach((label, i) => {
    const n = i + 1;
    html += `<div class="step-item" style="flex:${i < 2 ? 1 : 'none'}">
      <div class="step-content">
        <div class="step-circle ${step >= n ? 'active' : ''}">${n}</div>
        <span class="step-label ${step >= n ? 'active' : ''}">${label}</span>
      </div>`;
    if (i < 2) {
      html += `<div class="step-line ${step > n ? 'active' : ''}"></div>`;
    }
    html += `</div>`;
  });
  stepsBar.innerHTML = html;
}

// ─── File zone ───
function renderFileZone() {
  if (file) {
    const isImg = file.type.startsWith("image/");
    fileZone.innerHTML = `<div class="file-attached fade-up">
      <div class="file-icon">${isImg ? '🖼️' : '📄'}</div>
      <div class="file-info">
        <div class="file-name">${file.name}</div>
        <div class="file-meta">${getTypeLabel(file.type)} · ${(file.size / 1024).toFixed(1)} KB</div>
      </div>
      <button class="file-remove" id="file-remove-btn">&times;</button>
    </div>`;
    document.getElementById("file-remove-btn").addEventListener("click", () => {
      file = null; tableData = null; imgTip.style.display = "none";
      renderAll();
    });
    imgTip.style.display = isImg ? "block" : "none";
  } else {
    fileZone.innerHTML = `<div class="dropzone" id="dropzone">
      <div class="drop-icon">📎</div>
      <div class="drop-title">拖放文件到此处，或点击选择</div>
      <div class="drop-hint">支持 CSV / TSV / JSON / TXT / Excel / 图片（PNG, JPG, WebP）</div>
    </div>`;
    imgTip.style.display = "none";
    setupDropzone();
  }
}

function getTypeLabel(type) {
  const map = {
    "text/csv": "CSV", "application/vnd.ms-excel": "Excel",
    "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": "Excel",
    "text/plain": "Text", "text/tab-separated-values": "TSV",
    "application/json": "JSON", "image/png": "PNG", "image/jpeg": "JPEG",
    "image/webp": "WebP", "image/gif": "GIF"
  };
  return map[type] || "File";
}

function setupDropzone() {
  const dz = document.getElementById("dropzone");
  if (!dz) return;
  dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("dragging"); });
  dz.addEventListener("dragleave", () => { dz.classList.remove("dragging"); });
  dz.addEventListener("drop", (e) => {
    e.preventDefault();
    dz.classList.remove("dragging");
    const f = e.dataTransfer.files[0];
    if (f) { file = f; tableData = null; renderAll(); }
  });
  dz.addEventListener("click", () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".csv,.tsv,.txt,.json,.xlsx,.xls,.png,.jpg,.jpeg,.webp,.gif";
    input.addEventListener("change", () => {
      if (input.files[0]) { file = input.files[0]; tableData = null; renderAll(); }
    });
    input.click();
  });
}

// ─── Buttons ───
function renderButtons() {
  if (tableData) {
    btnArea.innerHTML = `<div class="btn-row">
      <button class="apple-btn ghost" id="reset-btn">重新上传</button>
      <button class="apple-btn blue full" id="download-btn">下载三线表 .docx</button>
    </div>`;
    document.getElementById("reset-btn").addEventListener("click", () => {
      file = null; tableData = null; renderAll();
    });
    document.getElementById("download-btn").addEventListener("click", handleDownload);
  } else {
    btnArea.innerHTML = `<button class="apple-btn blue full" id="convert-btn" ${loading || !apiKeyEl.value.trim() || !file ? 'disabled style="opacity:0.45;cursor:not-allowed;"' : ''}>
      ${loading ? '<span class="btn-spinner"></span>识别中…' : '开始识别并提取表格'}
    </button>`;
    document.getElementById("convert-btn").addEventListener("click", handleConvert);
  }
}

// ─── File reading ───
function readFileContent(f) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    const isImg = f.type.startsWith("image/");
    reader.onload = () => {
      if (isImg) {
        resolve({ type: "image", data: reader.result.split(",")[1], mediaType: f.type, raw: reader.result });
      } else {
        resolve({ type: "text", data: reader.result });
      }
    };
    reader.onerror = () => reject(new Error("文件读取失败"));
    if (isImg) reader.readAsDataURL(f);
    else reader.readAsText(f);
  });
}

// ─── DeepSeek API ───
async function extractTableData(apiKey, fileContent, customPrompt, model) {
  const contentParts = [];
  if (fileContent.type === "image") {
    contentParts.push({
      type: "image_url",
      image_url: { url: `data:${fileContent.mediaType};base64,${fileContent.data}` }
    });
  }
  const dataCtx = fileContent.type === "text" ? `\n\n以下是上传的数据内容:\n\`\`\`\n${fileContent.data}\n\`\`\`` : "";
  contentParts.push({
    type: "text",
    text: `请从${fileContent.type === "image" ? "这张图片" : "以下数据"}中提取表格信息，返回严格的 JSON 格式（不要用 markdown 代码块包裹，不要输出任何多余文字）。${customPrompt ? `\n用户补充说明: ${customPrompt}` : ""}${dataCtx}\n\n返回格式:\n{\n  "title": "表格标题",\n  "headers": ["列1", "列2", ...],\n  "rows": [\n    ["单元格1", "单元格2", ...],\n    ...\n  ]\n}\n\n注意:\n- 完整提取所有行列数据，不要遗漏\n- 保留原始文本，不要翻译或改写\n- 如果有换行的内容用 \\n 表示\n- 只返回 JSON`
  });

  const response = await fetch("https://api.deepseek.com/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model,
      messages: [
        { role: "system", content: "你是一个专业的数据提取助手。你只输出纯 JSON，不输出任何其他文字、解释或 markdown 代码块。" },
        { role: "user", content: contentParts }
      ],
      temperature: 0.1,
      max_tokens: 8192,
      stream: false
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API 错误: ${response.status}`);
  }
  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || "";
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

// ─── DOCX generation ───
async function generateDocx(td) {
  const noBorder = { style: BorderStyle.NONE, size: 0, color: "FFFFFF" };
  const thickBorder = { style: BorderStyle.SINGLE, size: 12, color: "000000" };
  const thinBorder = { style: BorderStyle.SINGLE, size: 6, color: "000000" };

  const numCols = td.headers.length;
  const totalWidth = 9360;
  const colWidth = Math.floor(totalWidth / numCols);
  const colWidths = Array(numCols).fill(colWidth);
  colWidths[numCols - 1] = totalWidth - colWidth * (numCols - 1);

  const cellMargins = { top: 60, bottom: 60, left: 100, right: 100 };

  function makeCell(text, width, borders, bold = false) {
    const lines = String(text).split("\n");
    const runs = [];
    lines.forEach((line, i) => {
      if (i > 0) runs.push(new TextRun({ break: 1, text: "", font: "SimSun", size: 21 }));
      runs.push(new TextRun({ text: line, bold, font: "SimSun", size: 21 }));
    });
    return new TableCell({
      width: { size: width, type: WidthType.DXA },
      borders,
      margins: cellMargins,
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { before: 40, after: 40, line: 276 },
          children: runs
        })
      ]
    });
  }

  const headerBorders = { top: thickBorder, bottom: thinBorder, left: noBorder, right: noBorder };
  const middleBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };
  const lastRowBorders = { top: noBorder, bottom: thickBorder, left: noBorder, right: noBorder };

  const headerRow = new TableRow({
    children: td.headers.map((h, i) => makeCell(h, colWidths[i], headerBorders, true))
  });

  const dataRows = td.rows.map((row, rowIdx) => {
    const isLast = rowIdx === td.rows.length - 1;
    return new TableRow({
      children: row.map((cell, i) => makeCell(cell, colWidths[i], isLast ? lastRowBorders : middleBorders, i === 0))
    });
  });

  const doc = new Document({
    styles: { default: { document: { run: { font: "SimSun", size: 21 } } } },
    sections: [{
      properties: {
        page: {
          size: { width: 12240, height: 15840 },
          margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
        }
      },
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 200 },
          children: [new TextRun({ text: td.title || "表格", bold: true, font: "SimHei", size: 24 })]
        }),
        new Table({
          width: { size: totalWidth, type: WidthType.DXA },
          columnWidths: colWidths,
          rows: [headerRow, ...dataRows]
        })
      ]
    }]
  });
  return await Packer.toBlob(doc);
}

// ─── Handlers ───
async function handleConvert() {
  if (!apiKeyEl.value.trim()) return showError("请输入 DeepSeek API Key");
  if (!file) return showError("请上传文件");
  errorBox.innerHTML = "";
  loading = true;
  renderAll();
  showProgress("正在读取文件…");
  try {
    const content = await readFileContent(file);
    showProgress("正在调用 DeepSeek 提取表格数据…");
    const data = await extractTableData(apiKeyEl.value.trim(), content, customPromptEl.value, modelEl.value);
    tableData = data;
    progressBox.innerHTML = "";
    loading = false;
    renderAll();
  } catch (e) {
    showError(e.message);
    progressBox.innerHTML = "";
    loading = false;
    renderAll();
  }
}

async function handleDownload() {
  if (!tableData) return;
  showProgress("正在生成三线表文档…");
  try {
    const blob = await generateDocx(tableData);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${tableData.title || "三线表"}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    progressBox.innerHTML = "";
  } catch (e) {
    showError("生成文档失败: " + e.message);
    progressBox.innerHTML = "";
  }
}

function showError(msg) {
  errorBox.innerHTML = `<div class="error-msg fade-up">⚠️ ${msg}</div>`;
}

function showProgress(msg) {
  progressBox.innerHTML = `<div class="progress-msg fade-up"><span class="spinner"></span>${msg}</div>`;
}

// ─── Preview ───
function renderPreview() {
  if (!tableData) { previewArea.innerHTML = ""; return; }
  const td = tableData;
  let html = `<div class="preview-card fade-up">
    <div class="preview-header">📋 数据预览 — ${escapeHtml(td.title)}</div>
    <div class="preview-scroll">
      <table class="preview-table">
        <thead><tr>${td.headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
        <tbody>`;
  td.rows.forEach((row, ri) => {
    const cls = ri === td.rows.length - 1 ? "last-row" : "";
    html += `<tr class="${cls}">${row.map((cell, ci) => `<td class="${ci === 0 ? 'bold-cell' : ''}">${escapeHtml(String(cell))}</td>`).join("")}</tr>`;
  });
  html += `</tbody></table></div></div>`;
  previewArea.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ─── Key toggle ───
keyToggle.addEventListener("click", () => {
  const isPw = apiKeyEl.type === "password";
  apiKeyEl.type = isPw ? "text" : "password";
  keyToggle.textContent = isPw ? "🙈" : "👁️";
});

// ─── Render all ───
function renderAll() {
  renderSteps();
  renderFileZone();
  renderButtons();
  renderPreview();
}

// ─── Init ───
renderAll();
</script>
</body>
</html>
